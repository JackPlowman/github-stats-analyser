name: "Sync labels"

on:
  push:
    branches:
      - main
    paths:
      - .github/tool-configurations/labels.yml
  workflow_dispatch:

permissions: {}

jobs:
  configure-labels:
    name: Configure Labels
    permissions:
      contents: read
      pull-requests: write
    uses: JackPlowman/reusable-workflows/.github/workflows/common-sync-labels.yml@c7d13342f6f54653bc35dc14d5a19dfa44821b18 # v2026.04.11.01
    secrets:
      workflow_github_token: ${{ secrets.GITHUB_TOKEN }}
